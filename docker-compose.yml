version: "3.9"

services:
  controller:
    build:
      context: .
      dockerfile: controller.dockerfile
    container_name: echonet_controller
    stdin_open: true
    tty: true
    networks:
      - echonet
    environment:
      - RUST_LOG=debug

  monolight:
    build:
      context: .
      dockerfile: monolight.dockerfile
    container_name: echonet_monolight
    networks:
      - echonet
    environment:
      - RUST_LOG=debug

networks:
  echonet:
    driver: bridge
